<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL MUKIT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@200;300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- External CSS references -->
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/home.css">
</head>
<body>

<!-- SVG FILTERS (Keep Inline to prevent cross-origin/render bugs) -->
<svg style="position:fixed;width:0;height:0;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cursor lens warp -->
    <filter id="warp-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="warp-turb" type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap id="warp-disp" in="SourceGraphic" in2="noise" scale="45" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Small bubble warp -->
    <filter id="bubble-warp" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.04" numOctaves="2" seed="12" result="bnoise"/>
      <feDisplacementMap in="SourceGraphic" in2="bnoise" scale="180" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- AUDIO (Now pointing to assets folder) -->
<audio id="bg-audio" autoplay loop preload="auto">
  <source src="assets/audio/bg-music.mpeg" type="audio/mpeg">
</audio>

<!-- CURSORS -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- CANVASES & OVERLAYS -->
<canvas id="bg-canvas" class="p-far"></canvas>
<div class="scanlines"></div>
<div class="edge-glow"></div>
<div class="bracket tl p-far"></div><div class="bracket tr p-far"></div>
<div class="bracket bl p-far"></div><div class="bracket br p-far"></div>
<canvas id="cv" class="p-far"></canvas>

<!-- NAV -->
<nav class="p-front">
  <div class="logo">Al Mukit</div>
  <div class="status-bar"><span class="status-dot"></span><span>Online</span><span>·</span><span id="clock">00:00:00</span></div>
  <div class="ham" id="ham"><span></span><span></span><span></span></div>
</nav>

  <div class="menu-links">

    <a href="book.html" class="menu-link highlight nav-link"><span class="menu-num">02</span>Book<span class="menu-arrow">→</span></a>

  <div class="menu-foot">hello@almukit.io<br>© 2026 Al Mukit</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag p-far" id="htag">Spatial Interface — 3.7</div>
  <h1 class="hero-title" id="htitle">
    <span class="t1">Want to</span>
    <span class="t2">Fly <span class="col">High</span></span>
  </h1>
  <div class="hero-line" id="hline"></div>
  <p class="hero-sub p-near" id="hsub">Copyright © 2026 All rights reserved<br>Made with <span style="filter:drop-shadow(0 0 10px #bf00ff) drop-shadow(0 0 20px #bf00ff);font-size:1.2em;">❤️</span> by Al Mukit</p>
</section>

<!-- WARP LAYER — clips to lens, shows distorted content -->
<div id="warp-layer"></div>

<!-- LENS DECORATIONS -->
<div id="lens-deco">
  <div id="lens-rim"></div>
  <div id="lens-spec"></div>
  <div id="lens-spec2"></div>
</div>

<!-- FLOATING BUBBLES -->
<div id="bubbles-container"></div>

<!-- BUTTONS -->
